# LyyAPI integrated config template (CLIProxyAPI)
# Use this file with deploy/integrated/docker-compose.yml

host: "0.0.0.0"
port: 8317

tls:
  enable: false
  cert: ""
  key: ""

remote-management:
  allow-remote: true
  # Use a strong value. CLIProxyAPI will hash plaintext automatically on startup.
  secret-key: "replace-with-management-secret"
  disable-control-panel: false
  panel-github-repository: "https://github.com/router-for-me/Cli-Proxy-API-Management-Center"

auth-dir: "~/.cli-proxy-api"

# Replace keys before production.
api-keys:
  - sk-change-this-key-1

debug: false
logging-to-file: true
usage-statistics-enabled: true

# Upstream proxy for external network access (optional)
proxy-url: ""

request-retry: 3
max-retry-credentials: 0
max-retry-interval: 30

routing:
  strategy: "round-robin"

ws-auth: false
nonstream-keepalive-interval: 0
